name: quick_hub_project
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.7 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  razorpay_flutter: ^1.3.5
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0
  firebase_messaging: ^16.1.3
  provider: ^6.1.5+1
  flutter_local_notifications: ^21.0.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  geocoding: ^3.0.0
  shared_preferences: ^2.5.5
  uuid: ^4.5.3
  intl: ^0.20.2
  google_fonts: ^8.0.2
  lottie: ^3.3.3
  url_launcher: ^6.3.1
  http: ^1.1.0
  fl_chart: ^1.2.0
  shimmer: ^3.0.0
  pdf: ^3.12.0
  path_provider: ^2.1.5
  open_file: ^3.5.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "lib/assets/images/quickhub_icon_logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - lib/assets/animations/help.json
